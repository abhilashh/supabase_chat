name: subasechatapp
description: "A Supabase chat application built with clean architecture."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.8.4

  # State management + DI
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^15.1.2

  # Functional programming (Either type)
  fpdart: ^1.1.1

  # Utilities
  http: ^1.2.2
  equatable: ^2.0.7
  uuid: ^4.5.1

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
